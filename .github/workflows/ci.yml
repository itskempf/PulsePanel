name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.304'

      - name: Restore
        run: dotnet restore PulsePanel.sln

      - name: Build (solution)
        run: dotnet build PulsePanel.sln -c Debug -warnaserror- -v:m

      - name: Test
        run: dotnet test src/\PulsePanel.Tests/\PulsePanel.Tests.csproj -c Debug --no-build --verbosity normal

      - name: Build WinUI app
        run: dotnet build src/\PulsePanel.App/\PulsePanel.App.csproj -c Debug -v:m
