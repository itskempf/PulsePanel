<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>PulsePanel</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="wrap">
    <h1>PulsePanel</h1>
    <form id="createForm" class="row">
      <label>Game:
        <select id="games"></select>
      </label>
      <label>Name:
        <input id="name" placeholder="my-server"/>
      </label>
      <button type="submit">Create</button>
    </form>

    <h2>Servers</h2>
    <div id="servers"></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
